<header class="btns_nav">
    <button class="btn_nav" id="btn_link_contato">
        <img src="../imagens/seta_baixo.png" alt="Seta_direita" class="seta_esquerda">
        <p class="btn_voltar">Voltar</p>
    </button>
</header>
<div class="modulo_header header_cadastro">
    <h2 class="h2_titulo">Endereço Principal</h2>
</div>
<div class="container_enderecos">
    <form>
        <div class="modulo_main">
            <div class="container_small_width">
                <div class="campo_contato small_width">
                    <label for="caixa_postal">Caixa Postal (CEP):</label>
                    <input type="text" id="caixa_postal" name="caixa_postal" class="campo_input">
                </div>
                <div class="campo_contato small_width">
                    <label for="pais">País:</label>
                    <input type="text" id="pais" name="pais" class="campo_input">
                </div>
            </div>
            <div class="container_small_width">
                <div class="campo_contato small_width">
                    <label for="estado">Estado:</label>
                    <input type="text" id="estado" name="estado" class="campo_input">
                </div>
                <div class="campo_contato small_width">
                    <label for="municipio">Município:</label>
                    <input type="text" id="municipio" name="municipio" class="campo_input">
                </div>
            </div>
            <div class="campo_contato normal_width">
                <label for="endereco">Endereço:</label>
                <input type="text" id="endereco" name="endereco" class="campo_input">
            </div>
            <div class="campo_contato normal_width">
                <label for="referencia">Ponto de Referência:</label>
                <input type="text" id="referencia" name="referencia" class="campo_input">
            </div>
            <div class="campo_contato normal_width">
                <label for="setor">Setor:</label>
                <input type="text" id="setor" name="setor" class="campo_input">
            </div>
        </div>
        <div class="start">
            <button class="btn btn2 btn_cancelar">
                <img src="..//..//../imagens/icone_fechar.svg" alt="Icone Salvar">
                <p>Cancelar</p>
            </button>
            <button class="btn_salvar btn">
                <img src="../imagens/icone_salvar.png" alt="Icone Salvar">
                <p>Salvar</p>
            </button>
        </div>
    </form>
</div>
