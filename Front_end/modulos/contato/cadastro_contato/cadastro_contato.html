<div class="modulo_header header_cadastro">
    <h2 class="h2_titulo">Cadastro de Contato</h2>
    <div class="container_codigo_data">
        <p class="p_codigo_id">Código: <span class="codigo_id"></span></p>
        <div class="div_data_cadastro">
            <p class="p_data_cadastro">Data de cadastro:</p>
            <p class="data_cadastro"></p>
        </div>
    </div>
</div>

<form id="form_cadastro_contato">
    <div id="aba_contato" class="aba_conteudo ativa">
        <div class="modulo_main">
            <div class="container_small_width" id="container_radios">
                <div class="campo_contato radio_contato">
                    <p>Tipo Pessoa:</p>
                    <div class="container_radios small_width">
                        <div class="container_radio">
                            <input type="radio" name="tipo_pessoa" id="contato_juridico" value="JURÍDICA">
                            <label for="contato_juridico">Jurídica</label>
                        </div>
                        <div class="container_radio">
                            <input type="radio" name="tipo_pessoa" id="contato_fisico" value="FÍSICA" checked>
                            <label for="contato_fisico">Física</label>
                        </div>
                    </div>
                </div>
                <div class="campo_contato radio_contato">
                    <p>Situação:</p>
                    <div class="container_radios small_width">
                        <div class="container_radio">
                            <input type="radio" name="situacao" id="ativo" value="ATIVO" checked>
                            <label for="ativo">Ativo</label>
                        </div>
                        <div class="container_radio">
                            <input type="radio" name="situacao" id="inativo" value="INATIVO">
                            <label for="inativo">Inativo</label>
                        </div>
                    </div>
                </div>
            </div>

            <div class="campo_contato normal_width">
                <label for="nome_razao_social">Nome (Razão Social):<span class="campo_obrigatorio">*</span></label>
                <input type="text" name="razao_social" id="nome_razao_social" class="campo_input" required>
            </div>

            <div class="campo_contato normal_width">
                <label for="nome_fantasia">Nome Fantasia:</label>
                <input type="text" name="nome_fantasia" id="nome_fantasia" class="campo_input">
            </div>

            <div class="campo_contato normal_width">
                <p>Classificação do contato:<span class="campo_obrigatorio">*</span></p>
                <div class="container_checkbox">
                    <div class="campo_checkbox">
                        <input type="checkbox" name="categorias" id="cliente" value="1">
                        <label for="cliente">Cliente</label>
                    </div>
                    <div class="campo_checkbox">
                        <input type="checkbox" name="categorias" id="fornecedor" value="2">
                        <label for="fornecedor">Fornecedor</label>
                    </div>
                    <div class="campo_checkbox">
                        <input type="checkbox" name="categorias" id="funcionario" value="3">
                        <label for="funcionario">Funcionário</label>
                    </div>
                </div>
            </div>
            <div class="container_small_width">
                <div class="campo_contato small_width">
                    <label for="fone1">Fone 1:<span class="campo_obrigatorio">*</span></label>
                    <input type="tel" name="fone1" id="fone1" class="campo_input" required>
                    </div>
                <div class="campo_contato small_width">
                    <label for="fone2">Fone 2:</label>
                    <input type="tel" name="fone2" id="fone2" class="campo_input">
                    </div>
                </div>
            <div class="campo_contato normal_width">
                <label for="insc_municipal">Insc. Municipal:</label>
                <input type="text" name="insc_municipal" id="insc_municipal" class="campo_input">
                </div>
            <div class="campo_contato normal_width">
                <label for="insc_estadual">Insc. Estadual:</label>
                <input type="text" name="insc_estadual" id="insc_estadual" class="campo_input">
                </div>
            <div class="campo_contato container_small_width" id="container_tipo_pessoa">
                <div class="small_width">
                    <label for="cnpj" id="label_cnpj">CNPJ:<span class="campo_obrigatorio">*</span></label>
                    <input type="text" name="cnpj" id="cnpj" class="campo_input">
                    </div>
                <div class="small_width">
                    <label for="cpf" id="label_cpf">CPF:<span class="campo_obrigatorio">*</span></label>
                    <input type="text" name="cpf" id="cpf" class="campo_input">
                    </div>
                </div>
            <div class="campo_contato normal_width">
                <label for="email_padrao">E-mail Padrão:</label>
                <input type="email" name="email_padrao" id="email_padrao" class="campo_input">
                </div>
            <div class="container_small_width">
                <div class="campo_contato small_width select_conainer">
                    <p>Perfil Tributário:</p>
                    <select id="perfil_tributario" class="campo_select" name="perfil_tributario">
                        <option value="padrão">Padrão</option>
                        <option value="tipo1">Tipo 1</option>
                        <option value="tipo2">Tipo 2</option>
                        </select>
                    </div>
                <div class="campo_contato small_width select_conainer">
                    <p>Tipo consumidor:</p>
                    <select id="tipo_consumidor" class="campo_select" name="tipo_consumidor">
                        <option value="padrão">Padrão</option>
                        <option value="tipo1">Tipo 1</option>
                        <option value="tipo2">Tipo 2</option>
                        </select>
                    </div>
                </div>
            <div class="campo_contato normal_width">
                <label for="observacao">Observação:</label>
                <textarea name="observacao" id="observacao" class="textarea" rows="4"></textarea>
                </div>
        </div>
    </div>

    <div id="aba_endereco" class="aba_conteudo">
        <div class="modulo_main">
            <div class="container_small_width">
                <div class="campo_contato small_width">
                    <label for="caixa_postal">Caixa Postal (CEP):<span class="campo_obrigatorio">*</span></label>
                    <input type="text" id="cep" name="cep" class="campo_input" required>
                </div>
                <div class="campo_contato small_width">
                    <label for="pais">País:<span class="campo_obrigatorio">*</span></label>
                    <input type="text" id="pais" name="pais" class="campo_input" required>
                </div>
            </div>
            <div class="container_small_width">
                <div class="campo_contato small_width">
                    <label for="estado">Estado:<span class="campo_obrigatorio">*</span></label>
                    <input type="text" id="estado" name="estado" class="campo_input" required>
                </div>
                <div class="campo_contato small_width">
                    <label for="municipio">Município:<span class="campo_obrigatorio">*</span></label>
                    <input type="text" id="municipio" name="municipio" class="campo_input" required>
                </div>
            </div>
            <div class="campo_contato normal_width">
                <label for="endereco">Endereço:<span class="campo_obrigatorio">*</span></label>
                <input type="text" id="endereco" name="endereco" class="campo_input" required>
            </div>
            <div class="campo_contato normal_width">
                <label for="ponto_referencia">Ponto de Referência:</label>
                <input type="text" id="ponto_referencia" name="ponto_referencia" class="campo_input">
            </div>
            <div class="campo_contato normal_width">
                <label for="setor">Setor:</label>
                <input type="text" id="setor" name="setor" class="campo_input">
            </div>
        </div>
    </div>

    <div class="space_between">
        <button type="button" class="btn btn2 btn_cancelar"> <img src="../imagens/icone_fechar.svg" alt="Icone Fechar">
            <p>Cancelar</p>
        </button>
        <button type="button" class="btn_salvar btn"> <img src="../imagens/icone_salvar.png" alt="Icone Salvar">
            <p>Salvar</p>
        </button>
    </div>
</form>
