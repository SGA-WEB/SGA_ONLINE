<section class="modulo" id="modulo_visualizar_orcamento">
    <menu class="menu_btns space_between align_center">
        <button class="btn_nav" id="btn_voltar_orcamento">
            <img src="..//..//../imagens/seta_baixo.png" alt="Seta_direita" class="seta_esquerda">
            <p class="btn_voltar">Voltar</p>
        </button>
        <div class="container_btns space_between">
            <button class="btn_editar btn btn2">
                <img src="..//..//../imagens/icone_editar.svg" alt="icone_editar">
                <p>Editar</p>
            </button>
            <button class="btn_excluir btn btn5">
                <img src="..//..//../imagens/icone_excluir.svg" alt="icone_editar">
                <p>Excluir</p>
            </button>
        </div>
    </menu>

    <div class="modulo_header header_cadastro">
        <h2 class="h2_titulo">Visualizar Orçamento</h2>
        <div class="container_codigo_data">
            <p class="p_codigo_id">Codigo: <span class="codigo_id"></span></p>
            <div class="div_data_cadastro">
                <p class="p_data_cadastro">Data de cadastro:</p>
                <p class="data_cadastro"></p>
            </div>
        </div>
    </div>

    <form id="form_orcamento">
        <div class="modulo_main flex! flex-wrap">
            <div class="campo_contato small_width select_conainer">
                <p>Cliente:</p>
                <div class="campo_contato small_width">
                    <input type="text" name="cliente" id="cliente" class="campo_input" disabled>
                </div>
            </div>
            <div class="campo_contato small_width select_conainer">
                <p>Status:</p>
                <div class="campo_contato small_width">
                    <input type="text" name="status" id="status" class="campo_input" disabled>
                </div>
            </div>
            <div class="campo_contato small_width">
                <label for="desconto_total">Desconto Total:</label>
                <input type="number" name="desconto_total" id="desconto_total" class="campo_input" disabled>
            </div>
            <div class="campo_contato small_width select_conainer">
                <p>Criado por:</p>
                <div class="campo_contato small_width">
                    <input type="text" name="criado_por_nome" id="criado_por_nome" class="campo_input" disabled>
                </div>
            </div>
            <div class="campo_contato normal_width">
                <label for="observacao">Descrição:</label>
                <textarea name="observacao" id="observacao" class="textarea max-w-30" rows="4" disabled></textarea>
            </div>
        </div>

        <h3 class="h3_titulo">Produtos relacionados:</h3>

        <div class="container_tabela">
            <table class="tabela" id="tabela_produtos">
                <thead>
                    <tr>
                        <th id="tabela_codigo">Código</th>
                        <th id="tabela_produto">Produto</th>
                        <th id="tabela_quantidade">Qtde.</th>
                        <th id="tabela_preco_varejo">Valor Unitario</th>
                        <th id="tabela_preco_atacado">Desconto</th>
                        <th id="tabela_preco_atacado">Valor Total</th>
                    </tr>
                </thead>
                <tbody class="tbody">
                </tbody>
            </table>
        </div>
    </form>
</section>
<!-- POP-UP ALERTA -->
<section class="container_popup" id="container_popup_excluir_produto">
    <div class="popup popup_alerta" id="popup_excluir_produto">
        <header>
            <img src="..//..//imagens/icone_alerta.svg" alt="icone_alerta">
            <h1>Confirme a exclusão</h1>
            <button class="btn_fechar_popup" id="btn_fechar_popup_excluir_produto">
                <img src="../imagens/icone_fechar.svg" alt="botão fechar popup" id="btn_fechar_popup_excluir_produto"
                    class="icone_fechar">
            </button>
        </header>
        <main>
            <p>
                Você tem certeza que deseja excluir o produto: <span class="codigo_popup_excluir"></span> - <span
                    class="item_popup_excluir"></span>
            </p>
            <div class="btns_container">
                <button class="btn" id="btn_popup_excluir_cancelar">Cancelar</button>
                <button class="btn btn5" id="btn_popup_excluir_excluir">Excluir</button>
            </div>
        </main>
    </div>
</section>
