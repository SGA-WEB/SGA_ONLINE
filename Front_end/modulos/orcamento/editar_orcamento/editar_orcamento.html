<section class="modulo" id="modulo_editar_orcamento">
    <menu class="menu_btns space_between align_center">
        <button class="btn_nav" id="btn_voltar_orcamento">
            <img src="../imagens/seta_baixo.png" alt="Voltar" class="seta_esquerda">

            <p class="btn_voltar">Voltar</p>
        </button>
    </menu>

    <div class="modulo_header header_cadastro">
        <h2 class="h2_titulo">Editar Orçamento</h2>
        <div class="container_codigo_data">
            <p class="p_codigo_id">Código: <span class="codigo_id"></span></p>
            <div class="div_data_cadastro">
                <p class="p_data_cadastro">Data de cadastro:</p>
                <p class="data_cadastro"></p>
            </div>
        </div>
    </div>

    <form id="form_orcamento">
        <div class="modulo_main flex! flex-wrap">
            <div class="campo_contato small_width select_conainer">
                <p>Cliente:<span class="campo_obrigatorio">*</span></p>
                <!-- name ajustado para cliente_id -->
                <select id="cliente" class="campo_select" name="cliente_id" required>
                    <option value=""></option>
                </select>
            </div>
            <div class="campo_contato small_width select_conainer">
                <p>Status:<span class="campo_obrigatorio">*</span></p>
                <select id="status" class="campo_select" name="status" required>
                    <option value="PENDENTE">PENDENTE</option>
                    <option value="FINALIZADO">FINALIZADO</option>
                    <option value="CONCLUÍDO">CONCLUÍDO</option>
                </select>
            </div>
            <div class="campo_contato small_width">
                    <label for="desconto_total">Desconto Total:</label>
                    <input type="number" name="desconto_total" id="desconto_total" class="campo_input" readonly>
            </div>
            <div class="campo_contato small_width select_conainer">
                <p>Criado por:<span class="campo_obrigatorio">*</span></p>
                <!-- name ajustado para usuario_id -->
                <select id="criado_por" class="campo_select" name="usuario_id" required>
                    <option value=""></option>
                </select>
            </div>
            <div class="campo_contato normal_width">
                <label for="observacao">Descrição:</label>
                <textarea name="observacao" id="observacao" class="textarea max-w-30" rows="4"></textarea>
            </div>
        </div>

        <h3 class="h3_titulo">Produtos relacionados:</h3>
        <button type="button" class="btn_add" id="btn_adicionar_relacao">
            <img src="../imagens/btn_add.svg" alt="Add">
            <span>Adicionar relação</span>
        </button>

        <div class="container_tabela">
            <table class="tabela" id="tabela_produtos">
                <thead>
                    <tr>
                        <th id="tabela_codigo">Código</th>
                        <th id="tabela_produto">Produto</th>
                        <th id="tabela_quantidade">Qtde.</th>
                        <th id="tabela_preco_varejo">Valor Unitário</th>
                        <th id="tabela_desconto">Desconto</th>
                        <th id="tabela_valor_total">Valor Total</th>
                    </tr>
                </thead>
                <tbody class="tbody"></tbody>
            </table>
        </div>

        <div class="space_between" style="margin-top: 20px;">
            <button type="button" class="btn btn2 btn_cancelar">Cancelar</button>
            <button type="submit" class="btn btn_salvar">Salvar Alterações</button>
        </div>
    </form>

    <!-- POPUP DE SELEÇÃO DE PRODUTOS -->
    <div class="container_popup popup_relacao">
        <div class="popup">
            <button class="btn_fechar_popup">×</button>
            <h2 class="h2_titulo">Selecione os produtos</h2>
            <div class="container_tabela">
                <table class="tabela" id="tabela_selecionar_produtos">
                    <thead>
                        <tr>
                            <th>Sel.</th>
                            <th>Código</th>
                            <th>Produto</th>
                            <th>Estoque</th>
                            <th>Preço</th>
                        </tr>
                    </thead>
                    <tbody class="tbody"></tbody>
                </table>
            </div>
            <button class="btn btn_selecionar_relacao">Confirmar Seleção</button>
        </div>
    </div>
</section>
