<section class="modulo" id="orcamento">
<div class="titulo1_container">
    <h1 class="titulo1">Orçamento</h1>
    <div class="dropdown_exportar">
        <button class="btn btn6 btn_exportar" id="btn_exportar_orcamento">
        <img src="../imagens/icone_download.svg" alt="Exportar" onerror="this.style.display='none'">
            <span>Exportar</span>
            <img src="../imagens/seta_baixo.png" alt="" class="icone_seta_exportar">
        </button>
        <ul class="dropdown_menu_exportar" id="dropdown_menu_exportar">
            <li><button class="dropdown_item_exportar" id="btn_exportar_pdf">PDF</button></li>
            <li><button class="dropdown_item_exportar" id="btn_exportar_xlsx">XLSX</button></li>
        </ul>
    </div>
</div>
    <header class="header">
        <div class="container_select">
            <p>Selecione a coluna que deseja pesquisar:</p>
            <select id="select_coluna" class="campo_select select_coluna">
                <option value="id_orcamento">Código</option>
                <option value="cliente_razao_social">Cliente</option>
                <option value="status">Status</option>
                <option value="criado_por_nome">Criado por</option>
                <option value="data_criacao">Criado em</option>
                <option value="valor_total">Total</option>
                <option value="desconto_total">Desconto</option>
                <option value="subtotal">Subtotal</option>
            </select>
        </div>
        <div class="container_campo_pesquisa_btn">
            <div class="campo_pesquisa" id="campo_pesquisa_contato">
                <input id="input_pesquisa_tabela" type="text" placeholder="Pesquisar por Código" class="input_pesquisa">
                <button class="btn_limpar_pesquisa hide center" id="btn_limpar_pesquisa_contato">
                    <img id="icone_fechar" src="../imagens/icone_fechar.svg" alt="icone_fechar">
                </button>
                <button class="btn_pesquisar center" id="btn_pesquisar_contato">
                    <img id="icone_pesquisa" src="../imagens/icone_pesquisa.png" alt="icone_pesquisa">
                </button>
            </div>
        </div>
    </header>
    <div class="container_btns">
        <button class="btn_add btn btn6" id="btn_criar_orcamento">
            <img src="../imagens/btn_add.svg" alt="Icone Adicionar Orçamento">
            <span>Adicionar Orçamento</span>
        </button>
        <button class="btn btn6 btn_change_view_mode table_mode" id="btn_exibir_modo_card_orcamento">
            <img src="..//..//imagens/icone_card_mode.svg" alt="Icone Card Mode">
            <span>Exibir modo card</span>
        </button>
    </div>
    <div class="container_tabela">
        <table class="tabela" id="tabela_produtos">
            <thead>
                <tr>
                    <th class="th_selecionar_todos">
                        <input type="checkbox" name="selecionar_todos" id="selecionar_todos">
                    </th>
                    <th id="codigo">Código</th>
                    <th id="cliente">Cliente</th>
                    <th id="status">Status</th>
                    <th id="criado_por">Criado por:</th>
                    <th id="criado_em">Criado em:</th>
                    <th id="subtotal">Subtotal:</th>
                    <th id="desconto">Desconto:</th>
                    <th id="total">Total</th>
                </tr>
            </thead>
            <tbody class="tbody">
            </tbody>
        </table>
    </div>
    </form>
</section>
