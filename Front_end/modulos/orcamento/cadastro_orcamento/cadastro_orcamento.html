<section class="modulo" id="modulo_cadastro_orcamento">
    <button class="btn_nav" id="btn_voltar_orcamento">
        <img src="../imagens/seta_baixo.png" alt="Seta_direita" class="seta_esquerda">
        <p class="btn_voltar">Voltar</p>
    </button>

    <div class="modulo_header header_cadastro">
        <h2 class="titulo1">Orçamento</h2>
        <div class="container_codigo_data">
            <p class="p_codigo_id">Codigo: <span class="codigo_id"></span></p>
            <div class="div_data_cadastro">
                <p class="p_data_cadastro">Data de cadastro:</p>
                <p class="data_cadastro"></p>
            </div>
        </div>
    </div>

    <form id="form_orcamento">
        <div class="modulo_main">
            <div class="container_small_width" id="container_radios">
                <div class="campo_contato small_width select_conainer">
                    <p>Cliente:<span class="campo_obrigatorio">*</span></p>
                    <select id="cliente_id" class="campo_select" name="cliente_id" required>
                        <option value=""></option>
                    </select>
                </div>
                <div class="campo_contato small_width select_conainer">
                    <p>Status:<span class="campo_obrigatorio">*</span></p>
                    <select id="status" class="campo_select" name="status" required>
                        <option value=""></option>
                        <option value="FINALIZADO">FINALIZADO</option>
                        <option value="PENDENTE">PENDENTE</option>
                        <option value="CONCLUÍDO">CONCLUÍDO</option>
                    </select>
                </div>
            </div>

            <div class="container_small_width">
                <div class="campo_contato small_width">
                    <label for="data_emissao">Data de Emissão:<span class="campo_obrigatorio">*</span></label>
                    <input type="date" name="data_emissao" id="data_emissao" class="campo_input" required>
                </div>
                <div class="campo_contato small_width">
                    <label for="data_recebimento">Data de Recebimento:<span class="campo_obrigatorio">*</span></label>
                    <input type="date" name="data_recebimento" id="data_recebimento" class="campo_input" required>
                </div>
            </div>
            <div class="container_small_width" id="container_radios">
                <div class="campo_contato small_width select_conainer">
                    <p>Criado por:<span class="campo_obrigatorio">*</span></p>
                    <select id="criado_por_id" class="campo_select" name="criado_por_id" required>
                        <option value=""></option>
                    </select>
                </div>
            </div>
            <div class="campo_contato normal_width">
                <label for="observacao">Descrição:</label>
                <textarea name="observacao" id="observacao" class="textarea max-w-30" rows="4"></textarea>
            </div>
        </div>
        <h3 class="h3_titulo">Produtos relacionados:<span class="campo_obrigatorio">*</span></h3>
        <button type="button" class="btn_add" id="btn_adicionar_relacao">
            <img src="../imagens/btn_add.svg" alt="Icone Adicionar">
            <span>Adicionar relação</span>
        </button>

        <div class="container_tabela">
            <table class="tabela mb-0!" id="tabela_produtos">
                <thead>
                    <tr>
                        <th id="tabela_codigo">Código</th>
                        <th id="tabela_produto">Produto</th>
                        <th id="tabela_quantidade">Qtde.</th>
                        <th id="tabela_preco_varejo">Valor Unitário</th>
                        <th id="tabela_preco_atacado">Desconto</th>
                        <th id="tabela_valor_total">Valor Total</th>
                    </tr>
                </thead>
                <tbody class="tbody apenas_crud_excluir">
                </tbody>
            </table>
        </div>
        <div class="container_totalizador">
            <p class="p_totalizador">Total dos produtos: <strong id="valor_total_produtos">R$ 0,00</strong></p>
        </div>

        <button type="submit" class="btn btn_salvar">
            <img src="../imagens/icone_salvar.svg" alt="Icone Salvar">
            <p>Salvar</p>
        </button>
    </form>

    <div class="container_popup popup_relacao">
        <div class="popup">
            <button class="btn_fechar_popup" type="button">
                <img src="../imagens/icone_fechar.svg" alt="Icone Fechar">
            </button>
            <h2 class="h2_titulo">Selecione os produtos para relacionar ao orçamento</h2>
            <div class="header">
                <div class="container_select">
                    <p>Coluna:</p>
                    <select id="select_coluna" class="campo_select">
                        <option value="id_produto">Código</option>
                        <option value="produto">Produto</option>
                        <option value="quantidade">Quantidade</option>
                        <option value="preco_varejo">Preço Varejo</option>
                    </select>
                </div>
                <div class="container_campo_pesquisa_btn">
                    <div class="campo_pesquisa">
                        <input id="input_pesquisa_tabela" type="text" placeholder="Pesquisar..." class="input_pesquisa">
                    </div>
                </div>
            </div>
            <div class="container_tabela">
                <table class="tabela" id="tabela_selecionar_produtos">
                    <thead>
                        <tr>
                            <th class="th_selecionar_todos"><input type="checkbox" id="selecionar_todos"></th>
                            <th>Código</th>
                            <th>Produto</th>
                            <th>Estoque</th>
                            <th>Valor Unitário</th>
                        </tr>
                    </thead>
                    <tbody class="tbody"></tbody>
                </table>
            </div>
            <button class="btn margin_left_auto btn_selecionar_relacao" type="button">
                <span>Adicionar Relação</span>
            </button>
        </div>
    </div>
</section>
