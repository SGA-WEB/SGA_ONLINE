<section class="modulo" id="modulo_visualizar_saida_produto">
    <menu class="menu_btns space_between align_center">
        <button class="btn_nav" id="btn_voltar_saida_produtos">
            <img src="..//..//../imagens/seta_baixo.png" alt="Seta_direita" class="seta_esquerda">
            <p class="btn_voltar">Voltar</p>
        </button>
    </menu>
    <div class="modulo_header header_cadastro">
        <h2 class="h2_titulo">Editar saída de produtos</h2>
        <div class="container_codigo_data">
            <p class="p_codigo_id">Código: <span class="codigo_id"></span></p>
            <div class="div_data_cadastro">
                <p class="p_data_cadastro">Data do cadastro:</p>
                <p class="data_cadastro"></p>
            </div>
        </div>
    </div>
    <form id="form_saida_produto">
        <div class="modulo_main">
            <div class="container_normal_width" id="container_chave_nfe" style="max-width: 500px;">
                <div class="campo_contato normal_width">
                    <label for="chave_nfe">Chave NF-e:</label>
                    <input type="text" inputmode="numeric" name="chave_nfe" id="chave_nfe" class="campo_input"
                        maxlength="44" pattern="[0-9]{1,44}"
                        oninvalid="this.setCustomValidity('Série deve ser um número de 44 dígitos')"
                        oninput="this.setCustomValidity('')">
                </div>
            </div>
            <div class="container_small_width" id="container_radios">
                <div class="campo_contato small_width">
                    <label for="numero_nf">Número N.F:</label>
                    <input type="text" name="numero_nf" id="numero_nf" class="campo_input" maxlength="20">
                </div>
                <div class="campo_contato small_width select_conainer">
                    <p>Destinatário:</p>
                    <input type="text" id="destinatario" class="campo_input" name="destinatario">
                </div>
            </div>
            <div class="container_small_width">
                <div class="campo_contato small_width select_conainer">
                    <p>Tipo de saída:</p>
                    <input type="text" id="tipo_de_saida" class="campo_input" name="tipo_de_saida">
                </div>
                <div class="campo_contato small_width">
                    <label for="data_saida">Data da saída:</label>
                    <input type="date" name="data_saida" id="data_saida" class="campo_input">
                </div>
            </div>
            <div class="container_small_width">
                <div class="campo_contato small_width select_conainer">
                    <p>Status da saída:</p>
                    <input type="text" id="status_da_saida" class="campo_input" name="status_da_saida">
                </div>
                <div class="campo_contato small_width">
                    <label for="valor_total">Valor Total:</label>
                    <input type="number" name="valor_total" id="valor_total" class="campo_input" step="0.01"
                        min="0">
                </div>
            </div>
            <div class="container_small_width">
                <div class="campo_contato small_width">
                    <label for="serie">Série:</label>
                    <input type="text" inputmode="numeric" name="serie" id="serie" class="campo_input"
                        maxlength="3" pattern="[0-9]{1,3}"
                        oninvalid="this.setCustomValidity('Série deve ser um número de 1 a 3 dígitos')"
                        oninput="this.setCustomValidity('')">
                </div>
                <div class="campo_contato small_width">
                    <label for="sub_serie">Sub-Série</label>
                    <input type="text" inputmode="numeric" name="sub_serie" id="sub_serie" class="campo_input"
                        maxlength="2" pattern="[0-9]{1,3}"
                        oninvalid="this.setCustomValidity('Série deve ser um número de 1 a 3 dígitos')"
                        oninput="this.setCustomValidity('')">
                </div>
            </div>
            <div class="container_small_width">
                <div class="campo_contato small_width">
                    <label for="modelo">Modelo Fiscal:</label>
                    <input type="text" name="modelo" id="modelo" class="campo_input" maxlength="2">
                </div>
            </div>
        </div>
        <h3 class="h3_titulo">Produtos relacionados:</h3>
        <div class="container_tabela">
            <table class="tabela" id="tabela_produtos">
                <thead>
                    <tr>
                        <th id="tabela_codigo">Código</th>
                        <th id="tabela_produto">Produto</th>
                        <th id="tabela_quantidade">Qtde.</th>
                        <th id="tabela_preco_varejo">Valor Unitario</th>
                        <th id="tabela_preco_atacado">Desconto</th>
                        <th id="tabela_preco_atacado">Valor Total</th>
                    </tr>
                </thead>
                <tbody class="tbody">
                </tbody>
            </table>
        </div>
    </form>
</section>
<div class="container_popup popup_relacao">
    <div class="popup">
        <button class="btn_fechar_popup">
            <img src="../imagens/icone_fechar.svg" alt="Icone Fechar">
        </button>
        <h2 class="h2_titulo">Selecione os produtos para relacionar a saida</h2>
        <div class="header">
            <div class="container_select">
                <p>Coluna:</p>
                <select id="select_coluna" class="campo_select">
                    <option value="id_produto">Código</option>
                    <option value="produto">Produto</option>
                    <option value="quantidade">Quantidade</option>
                    <option value="preco_varejo">Preço Varejo</option>
                    <option value="preco_atacado">Preço Atacado</option>
                </select>
            </div>
            <div class="container_campo_pesquisa_btn">
                <div class="campo_pesquisa" id="campo_pesquisa_produto">
                    <input id="input_pesquisa_tabela" type="text" placeholder="Pesquisar por Código"
                        class="input_pesquisa">
                    <button class="btn_limpar_pesquisa hide center" id="btn_limpar_pesquisa_produto">
                        <img id="icone_fechar" src="../imagens/icone_fechar.svg" alt="icone_fechar">
                    </button>
                    <button class="btn_pesquisar center" id="btn_pesquisar_produto">
                        <img id="icone_pesquisa" src="../imagens/icone_pesquisa.png" alt="icone_pesquisa">
                    </button>
                </div>
            </div>
        </div>
        <div class="container_tabela">
            <table class="tabela" id="tabela_selecionar_produtos">
                <thead>
                    <tr>
                        <th class="th_selecionar_todos">
                            <input type="checkbox" name="selecionar_todos" id="selecionar_todos">
                        </th>
                        <th id="tabela_codigo">Código</th>
                        <th id="tabela_produto">Produto</th>
                        <th id="tabela_quantidade">Qtde.</th>
                        <th id="tabela_preco_varejo">Valor Unitario</th>
                    </tr>
                </thead>
                <tbody class="tbody">
                </tbody>
            </table>
        </div>
    </div>
</div>
</section>
