<section class="modulo" id="modulo_cadastro_de_centro_de_estoque">
    <button class="btn_nav" id="btn_voltar_tipos_de_entrada">
        <img src="..//..//../imagens/seta_baixo.png" alt="Seta_direita" class="seta_esquerda">
        <p class="btn_voltar">Voltar</p>
    </button>
    <div class="modulo_header header_cadastro">
        <h2 class="h2_titulo">Editar Tipos de Entrada</h2>
        <div class="container_codigo_data">
            <p class="p_codigo_id">Codigo: <span class="codigo_id">08</span></p>
            <div class="div_data_cadastro">
                <p class="p_data_cadastro">Data de cadastro:</p>
                <p class="data_cadastro"></p>
            </div>
        </div>  
    </div>
    <div class="modulo_main">
        <div class="container_small_width" id="container_radios"> 
            <label for="descricao">Descrição:</label>
                <textarea name="descricao" id="descricao" class="textarea" rows="4" maxlength="20"></textarea>
            </div>   
            <div class="campo_contato small_width">
                <label for="cfop_dentro">Cfop(Dentro):</label>
                <input type="text" name="cfop_dentro" id="cfop_dentro" class="campo_input">
            </div>
            <div class="campo_contato small_width">
                <label for="cfop_fora">Cfop(Fora):</label>
                <input type="text" name="cfop_fora" id="cfop_fora" class="campo_input">
            </div>
            <div class="campo_contato small_width select_conainer">
                <label for="Ativo">Ativo:</label>
                <select id="ativo" class="campo_select">
                    <option value="true">SIM</option>
                    <option value="false">NÃO</option>
                </select>
            </div>
            <label for="movimenta_estoque">
        <input type="checkbox" nome="Movimenta Estoque" value="Movimenta Estoque" id="movimenta_estoque">
        Movimenta Estoque
    </label><br>

    <label for="hab_agrupamento">
        <input type="checkbox" nome="Hab.Agrupamento" value="Hab.Agrupamento" id="hab_agrupamento">
        Habilita Agrupamento
    </label><br>

    <label for="hab_movimento">
        <input type="checkbox" nome="Hab.Movimento"  value="Hab.Movimento" id="hab_movimento">
        Habilita Movimento
    </label><br>

     <label for="hab_nf">
        <input type="checkbox" nome="habilitaNF"  value="Habilita N.F" id="hab_nf">
        Habilita N.F
    </label><br>

    <label for="atualiza_produto">
        <input type="checkbox" nome= "Atualiza Produto" value="Atualiza Produto" id="atualiza_produto">
        Atualiza Produto
    </label><br>

      <label for="padrao">
        <input type="checkbox" nome= "Padrão" value="Padrão" id="padrao">
        Padrão
    </label><br>
    </div>
    <div class="space_between">
        <button class="btn btn2 btn_cancelar">
            <img src="..//..//../imagens/icone_fechar.svg" alt="Icone Salvar">
            <p>Cancelar</p>
        </button>
        <button class="btn btn_salvar">
            <img src="..//..//../imagens/icone_salvar.svg" alt="Icone Salvar">
            <p>Salvar</p>
        </button>
    </div>
</section>
