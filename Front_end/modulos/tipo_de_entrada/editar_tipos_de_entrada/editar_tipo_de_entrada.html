<section class="modulo" id="modulo_cadastro_de_centro_de_estoque">
    <button class="btn_nav" id="btn_voltar_tipos_de_entrada">
        <img src="..//..//../imagens/seta_baixo.png" alt="Seta_direita" class="seta_esquerda">
        <p class="btn_voltar">Voltar</p>
    </button>
    <div class="modulo_header header_cadastro">
        <h2 class="h2_titulo">Editar Tipos de Entrada</h2>
        <div class="container_codigo_data">
            <p class="p_codigo_id">Codigo: <span class="codigo_id">08</span></p>
            <div class="div_data_cadastro">
                <p class="p_data_cadastro">Data de cadastro:</p>
                <p class="data_cadastro"></p>
            </div>
        </div>  
    </div>
     <form id="form_cadastro_tipo_entrada">
        <div class="container_btns">
            <button type="submit" class="btn btn_salvar" id="btn_salvar">
                <img src="../imagens/icone_salvar.svg" alt="Icone Salvar">
                <p>Salvar</p>
            </button>
        </div>
        <div class="modulo_main">
            <div class="campo_contato small_width">
                <label for="descricao">Descrição:<span class="campo_obrigatorio">*</span></label>
                <input type="text" name="descricao" id="descricao" class="campo_input" required>
            </div>
            <div class="campo_contato small_width">
                <label for="cfop_dentro">CFOP(Dentro):<span class="campo_obrigatorio">*</span></label>
                <input type="number" name="cpopD" id="cfop_dentro" class="campo_input" min="0" max="9999"
                    oninput="if(this.value.length > 4) this.value = this.value.slice(0, 4)" required>
            </div>
            <div class="campo_contato small_width">
                <label for="cfop_fora">CFOP(Fora):<span class="campo_obrigatorio">*</span></label>
                <input type="number" name="cpopF" id="cfop_fora" class="campo_input" min="0" max="9999"
                    oninput="if(this.value.length > 4) this.value = this.value.slice(0, 4)" required>
            </div>
            <div class="campo_contato small_width select_conainer">
                <label for="ativo">Ativo:<span class="campo_obrigatorio">*</span></label>
                <select id="ativo" class="campo_select" required>
                    <option value="">Selecione...</option>
                    <option value="true">Sim</option>
                    <option value="false">Não</option>
                </select>
            </div>
        </div>

        <p>Marque ao menos uma opção.<span class="campo_obrigatorio">*</span></p>

        <label for="movimenta_estoque">
            <input type="checkbox" nome="Movimenta Estoque" value="Movimenta Estoque" id="movimenta_estoque"
                class="checkbox_opcao">
            Movimenta Estoque
        </label><br>

        <label for="hab_agrupamento">
            <input type="checkbox" nome="Hab.Agrupamento" value="Hab.Agrupamento" id="hab_agrupamento"
                class="checkbox_opcao">
            Habilita Agrupamento
        </label><br>

        <label for="hab_movimento">
            <input type="checkbox" nome="Hab.Movimento" value="Hab.Movimento" id="hab_movimento" class="checkbox_opcao">
            Habilita Movimento
        </label><br>

        <label for="hab_nf">
            <input type="checkbox" nome="habilitaNF" value="Habilita N.F" id="hab_nf" class="checkbox_opcao">
            Habilita N.F
        </label><br>

        <label for="atualiza_produto">
            <input type="checkbox" nome="Atualiza Produto" value="Atualiza Produto" id="atualiza_produto"
                class="checkbox_opcao">
            Atualiza Produto
        </label><br>

        <label for="padrao">
            <input type="checkbox" nome="Padrão" value="Padrão" id="padrao" class="checkbox_opcao">
            Padrão
        </label><br>


    </form>
</section>
