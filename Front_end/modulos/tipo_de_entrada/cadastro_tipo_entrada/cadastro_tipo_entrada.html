<section class="modulo" id="modulo_cadastro_tipo_entrada">
    <button class="btn_nav" id="btn_voltar_tipos_de_entrada">
        <img src="../imagens/seta_baixo.png" alt="Seta_direita" class="seta_esquerda">
        <p class="btn_voltar">Voltar</p>
    </button>
    <div class="modulo_header header_cadastro">
        <h2 class="h2_titulo">Cadastro de Tipos de Entrada</h2> 
    </div>
    <form>
        <div class="container_btns">
            <button class="btn btn_salvar" id="btn_salvar">
                <img src="../imagens/icone_salvar.svg" alt="Icone Salvar">
                <p>Salvar</p>
            </button>
        </div>
        <div class="modulo_main">
            <div class="campo_contato small_width">
                <label for="descricao">Descrição:<span class="campo_obrigatorio">*</span></label>
                <input type="text" name="descricao" id="descricao" class="campo_input" required>
            </div>
            <div class="campo_contato small_width">
                <label for="CFOP">CFOP(Dentro):<span class="campo_obrigatorio">*</span></label>
                <input type="text" name="cpopD" id="cfop_dentro" class="campo_input" required>
            </div>
            <div class="campo_contato small_width">
                <label for="CFOP">CFOP(Fora):<span class="campo_obrigatorio">*</span></label>
                <input type="text" name="cpopF" id="cfop_fora" class="campo_input" required>
            </div>
            <div class="campo_contato small_width select_conainer">
                <p>Ativo:<span class="campo_obrigatorio">*</span></p>
                <select id="ativo" class="campo_select" required>
                    <option value="true">Sim</option>
                    <option value="false">Não</option>
                </select>
            </div>
        </div>
    </form>
    <label for="movimenta_estoque">
        <input type="checkbox" nome="Movimenta Estoque" value="Movimenta Estoque" id="movimenta_estoque">
        Movimenta Estoque
    </label><br>

    <label for="hab_agrupamento">
        <input type="checkbox" nome="Hab.Agrupamento" value="Hab.Agrupamento" id="hab_agrupamento">
        Habilita Agrupamento
    </label><br>

    <label for="hab_movimento">
        <input type="checkbox" nome="Hab.Movimento"  value="Hab.Movimento" id="hab_movimento">
        Habilita Movimento
    </label><br>

     <label for="hab_nf">
        <input type="checkbox" nome="habilitaNF"  value="Habilita N.F" id="hab_nf">
        Habilita N.F
    </label><br>

    <label for="atualiza_produto">
        <input type="checkbox" nome= "Atualiza Produto" value="Atualiza Produto" id="atualiza_produto">
        Atualiza Produto
    </label><br>

      <label for="padrao">
        <input type="checkbox" nome= "Padrão" value="Padrão" id="padrao">
        Padrão
    </label><br>

</section>
