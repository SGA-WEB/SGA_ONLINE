<section class="modulo" id="tipo_de_entrada">
    <h1 class="titulo1">Tipos de Entrada</h1>
    <div class="header">
    <div class="container_select">
        <p>Selecione a coluna desejada:</p>
        <select id="campo_select_tipo_entrada" class="campo_select select_coluna">
            <option value="id_tipo_de_entrada">Código</option>
            <option value="descricao">Descrição</option>
            <option value="cfop_dentro">CFOP(Dentro)</option>
            <option value="cfop_fora">CPOP(Fora)</option>
            <option value="ativo">Ativo</option>
        </select>
    </div>
    <div class="container_campo_pesquisa_btn">
        <div class="campo_pesquisa" id="campo_pesquisa_tipo_entrada">
            <input id="input_pesquisa_tabela" type="text" placeholder="Pesquisar por Código" class="input_pesquisa">
            <button class="btn_limpar_pesquisa hide center" id="btn_limpar_pesquisa_tipo_entrada">
                <img id="icone_fechar" src="../imagens/icone_fechar.svg" alt="icone_fechar">
            </button>
            <button class="btn_pesquisar center" id="btn_pesquisar_tipo_entrada">
                <img id="icone_pesquisa" src="../imagens/icone_pesquisa.png" alt="icone_pesquisa">
            </button>
        </div>
    </div>
    </div>
    <button class="btn_add" id="btn_adicionar_tipos_de_entrada">
        <img src="..//..//imagens/btn_add.svg" alt="Icone Adicionar">
        <span>Adicionar Tipo de Entrada</span>
    </button>
    <div class="container_tabela">
    <table class="tabela" id="tabela_tipo_entrada">
        <thead>
            <tr>
                <th>
                    <input type="checkbox" name="selecionar_todos" id="selecionar_todos">
                </th>
                <th id="">Código</th>
                <th id="">Descrição</th>
                <th id="">CFOP(Dentro)</th>
                <th id="">CFOP(Fora)</th>
                <th id="">Ativo</th>
            </tr>
        </thead>
        <tbody class="tbody">

        </tbody>
    </table>
    </div>
</section>
<section class="container_popup" id="container_popup_excluir_contato">
    <div class="popup popup_alerta" id="popup_excluir_contato">
        <header>
            <img src="..//..//imagens/icone_alerta.svg" alt="icone_alerta">
            <h1>Confirme a exclusão</h1>
            <button class="btn_fechar_popup" id="btn_fechar_popup_excluir_contato">
                <img src="../imagens/icone_fechar.svg" alt="botão fechar popup" id="btn_fechar_popup_excluir_contato" class="icone_fechar">
            </button>
        </header>
        <main>
            <p>
                Você tem certeza que deseja excluir o cadastro de tipo de entrada: <span class="codigo_popup_excluir"></span> - <span class="item_popup_excluir"></span>
            </p>
            <div class="btns_container">
                <button class="btn" id="btn_popup_excluir_cancelar">Cancelar</button>
                <button class="btn btn5" id="btn_popup_excluir_excluir">Excluir</button>
            </div>
        </main>
    </div>
</section>
