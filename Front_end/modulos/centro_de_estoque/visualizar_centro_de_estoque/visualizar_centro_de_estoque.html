<section class="modulo" id="modulo_cadastro_de_centro_de_estoque">
    <menu class="menu_btns space_between align_center">
        <button class="btn_nav" id="btn_voltar_centro_de_estoque">
            <img src="..//..//../imagens/seta_baixo.png" alt="Seta_direita" class="seta_esquerda">
            <p class="btn_voltar">Voltar</p>
        </button>
        <div class="container_btns space_between">
            <button class="btn_editar btn btn2">
                <img src="..//..//../imagens/icone_editar.svg" alt="icone_editar" >
                <p>Editar</p>
            </button>
            <button class="btn_excluir btn btn5">
                <img src="..//..//../imagens/icone_excluir.svg" alt="icone_editar" >
                <p>Excluir</p>
            </button>
        </div>
    </menu>
    <div class="modulo_header header_cadastro">
        <h2 class="h2_titulo">Visualizar de centro de estoque</h2>
        <div class="container_codigo_data">
            <p class="p_codigo_id">Codigo: <span class="codigo_id">08</span></p>
            <div class="div_data_cadastro">
                <p class="p_data_cadastro">Data de cadastro:</p>
                <p class="data_cadastro"></p>
            </div>
        </div>  
    </div>
    <div class="modulo_main">
        <div class="container_small_width" id="container_radios"> 
            <div class="campo_contato normal_width">
                <label for="nome_centro_de_estoque">Nome do Centro de Estoque:</label>
                <input disabled type="text" name="nome_centro_de_estoque" id="nome_centro_de_estoque" class="campo_input">
            </div>
            <div class="campo_contato small_width">
                <label for="localizacao">Localização:</label>
                <input disabled type="text" name="localizacao" id="localizacao" class="campo_input">
            </div>
            <div class="campo_contato small_width select_conainer">
                <label for="padrao_centro_de_estoque">Padrão:</label>
                <select disabled id="padrao_centro_de_estoque" class="campo_select">
                    <option value="Sim">Sim</option>
                    <option value="Não">Não</option>
                </select>
            </div>
            <div class="campo_contato normal_width">
                <label for="descricao">Descrição:</label>
                <textarea disabled name="descricao" id="descricao" class="textarea" rows="4"></textarea>
            </div>   
        </div>
    </div>
</section>
<section class="container_popup " id="container_popup_excluir_contato">
    <div class="popup popup_alerta" id="popup_excluir_contato">
        <header>
            <img src="..//..//imagens/icone_alerta.svg" alt="icone_alerta">
            <h1>Comfirme a exclusão</h1>
            <button class="btn_fechar_popup" id="btn_fechar_popup_excluir_contato">
                <img src="../imagens/icone_fechar.svg" alt="botão fechar popup" id="btn_fechar_popup_excluir_contato" class="icone_fechar">
            </button>
        </header>
        <main>
            <p>
                Você tem certeza que deseja excluir o centro de estoque: <span class="codigo_popup_excluir"></span> - <span class="item_popup_excluir"></span>
            </p>
            <div class="btns_container">
                <button class="btn" id="btn_popup_excluir_cancelar">Cancelar</button>
                <button class="btn btn5" id="btn_popup_excluir_excluir">Excluir</button>
            </div>
        </main>
    </div>
</section>
