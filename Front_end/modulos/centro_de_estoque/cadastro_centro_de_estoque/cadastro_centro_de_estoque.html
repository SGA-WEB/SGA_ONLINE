<section class="modulo" id="modulo_cadastro_de_centro_de_estoque">
    <button class="btn_nav" id="btn_voltar_produtos">
        <img src="..//..//../imagens/seta_baixo.png" alt="Seta_direita" class="seta_esquerda">
        <p class="btn_voltar">Voltar</p>
    </button>
    <div class="modulo_header header_cadastro">
        <h2 class="h2_titulo">Cadastro de centro de estoque</h2>
        <div class="container_codigo_data">
            <p class="p_codigo_id">Codigo: <span class="codigo_id">08</span></p>
            <div class="div_data_cadastro">
                <p class="p_data_cadastro">Data de cadastro:</p>
                <p class="data_cadastro"></p>
            </div>
        </div>
    </div>
    <form>
        <div class="modulo_main">
            <div class="container_small_width" id="container_radios">
                <div class="campo_contato normal_width">
                    <label for="nome_centro_estoque">Nome do Centro de Estoque:<span class="campo_obrigatorio">*</span></label>
                    <input type="text" name="nome_centro_estoque" id="nome_centro_estoque" class="campo_input" required>
                </div>
                <div class="campo_contato small_width">
                    <label for="localizacao_centro_estoque">Localização:<span class="campo_obrigatorio">*</span></label>
                    <input type="text" name="localizacao_centro_estoque" id="localizacao_centro_estoque" class="campo_input" required>
                </div>
                <div class="campo_contato small_width select_conainer">
                    <label for="padrao_centro_estoque">Padrão:<span class="campo_obrigatorio">*</span></label>
                    <select id="padrao_centro_estoque" name="padrao_centro_estoque" class="campo_select" required>
                        <option value="sim">Sim</option>
                        <option value="nao">Não</option>
                    </select>
                </div>
                <div class="campo_contato normal_width">
                      <label for="descricao_centro_estoque">Descrição:</label>
                      <textarea name="descricao_centro_estoque" id="descricao_centro_estoque" class="textarea" rows="4"></textarea>
                </div>
            </div>
        </div>
        <button class="btn btn_salvar">
            <img src="..//..//../imagens/icone_salvar.svg" alt="Icone Salvar">
            <p>Salvar</p>
        </button>
    </form>
</section>
