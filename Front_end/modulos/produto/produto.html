<section class="modulo" id="produto">
    <h1 class="titulo1">Lista de Produtos</h1>
    <div class="header">
        <div class="container_select">
            <p>Coluna:</p>
            <select id="select_coluna" class="campo_select select_coluna">
                <option value="id_produto">Código</option>
                <option value="produto">Produto</option>
                <option value="quantidade">Quantidade</option>
                <option value="preco_varejo">Preço Varejo</option>
                <option value="preco_atacado">Preço Atacado</option>
            </select>
        </div>
        <div class="container_campo_pesquisa_btn">
            <div class="campo_pesquisa" id="campo_pesquisa_produto">
                <input id="input_pesquisa_tabela" type="text" placeholder="Pesquisar por " class="input_pesquisa">
                <button class="btn_limpar_pesquisa hide center" id="btn_limpar_pesquisa_produto">
                    <img id="icone_fechar" src="../imagens/icone_fechar.svg" alt="icone_fechar">
                </button>
                <button class="btn_pesquisar center" id="btn_pesquisar_produto">
                    <img id="icone_pesquisa" src="../imagens/icone_pesquisa.png" alt="icone_pesquisa">
                </button>
            </div>
        </div>
    </div>
    <div class="container_btns">
        <button class="btn_add btn btn6" id="btn_adicionar">
            <img src="../imagens/btn_add.svg" alt="Icone Adicionar">
            <span>Adicionar Produto</span>
        </button>
        <button class="btn btn6 btn_change_view_mode table_mode" id="btn_exibir_modo_card_centro_de_estoque">
            <img src="..//..//imagens/icone_card_mode.svg" alt="Icone Adicionar">
            <span>Exibir modo card</span>
        </button>
    </div>
    <div class="container_tabela">
        <table class="tabela" id="tabela_produtos">
            <thead>
                <tr>
                    <th class="th_selecionar_todos">
                        <input type="checkbox" name="selecionar_todos" id="selecionar_todos">
                    </th>
                    <th id="tabela_codigo">Código</th>
                    <th id="tabela_produto">Produto</th>
                    <th id="tabela_quantidade">Qtde.</th>
                    <th id="tabela_preco_varejo">Preço Varejo</th>
                    <th id="tabela_preco_atacado">Preço Atacado</th>
                    <th id="corredor">Corredor</th>
                    <th id="prateleira">Prateleira</th>
                </tr>
            </thead>
            <tbody class="tbody">

            </tbody>
        </table>
    </div>
</section>
<!-- POP-UP ALERTA -->
<section class="container_popup " id="container_popup_excluir_produto">
    <div class="popup popup_alerta" id="popup_excluir_produto">
        <header>
            <img src="..//..//imagens/icone_alerta.svg" alt="icone_alerta">
            <h1>Confirme a exclusão</h1>
            <button class="btn_fechar_popup" id="btn_fechar_popup_excluir_produto">
                <img src="../imagens/icone_fechar.svg" alt="botão fechar popup" id="btn_fechar_popup_excluir_produto" class="icone_fechar">
            </button>
        </header>
        <main>
            <p>
                Você tem certeza que deseja excluir o produto: <span class="codigo_popup_excluir"></span> - <span class="item_popup_excluir"></span>
            </p>
            <div class="btns_container">
                <button class="btn" id="btn_popup_excluir_cancelar">Cancelar</button>
                <button class="btn btn5" id="btn_popup_excluir_excluir">Excluir</button>
            </div>
        </main>
    </div>
</section>
