<section class="cadastro-usuario modulo">
  <button class="btn_nav" id="btn_voltar_config">
    <img src="../imagens/seta_baixo.png" alt="Seta_direita" class="seta_esquerda">
    <p class="btn_voltar">Voltar</p>
  </button>
  <h1 class="titulo1">Configurações</h1>
  <div class="container">
    <nav class="nav_config">
      <form id="formulario_usuario">
        <div class="nome-usuario">
          <label for="nome_completo">Nome(Completo): <span class="campo_obrigatorio">*</span></label>
          <div class="Campo-nome">
            <input class="campo_input" type="text" id="digite-nome" name="Nome-usuario" required autocomplete="">
          </div>
        </div>
        <div class="email-container">
          <div class="email">
            <label for="email">Email: <span class="campo_obrigatorio">*</span></label>
            <input class="campo_input" type="email" class="campo-email" id="email" name="email" required>
          </div>
          <div class="email">
            <label for="confirmacao_email">Confirmar Email: <span class="campo_obrigatorio">*</span></label>
            <input class="campo_input" type="email" class="campo-email" id="confirmar-email" name="confirme-email" required>
          </div>
        </div>
        <div class="senha-container">
          <div class="senha">
            <label for="senha">Senha: <span class="campo_obrigatorio">*</span></label>
            <input class="campo_input" type="password" class="campo-senha" id="senha" name="Senha" required
              autocomplete="new-password" maxlength="6" minlength="6">
          </div>
          <div class="senha">
            <label for="confirmacao_senha">Confirmar Senha: <span class="campo_obrigatorio">*</span></label>
            <input class="campo_input" type="password" class="campo-senha" id="confirmar-senha" name="confirmar-senha"
              autocomplete="new-password" maxlength="6" minlength="6">
          </div>
        </div>
        <div class="fone-grupo-container">
          <div class="fone-grupo">
            <label for="telefone">Telefone: <span class="campo_obrigatorio">*</span></label>
            <input class="campo_input" type="tel" class="campo-fone" id="fone" name="fone" required>
          </div>
        </div>
        <button type="submit" class="btn">Cadastrar</button>
      </form>
    </main>
</section>
